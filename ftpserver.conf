# Endereco e porta do canal de controle.
# Use porta acima de 1024 para rodar sem root.
bind_address = 0.0.0.0
port = 2121

# Usuario simples para este servidor basico.
username = admin
password = admin123

# Pasta que ficara visivel no FTP. Altere este caminho para servir outra pasta.
# O servidor cria a pasta se ela nao existir e impede acesso fora dela.
root_dir = /home/jcarvalho/Documentos/ftp-files

# Portas usadas no modo passivo para LIST, RETR e STOR.
# Se for publicar em rede externa, libere esse intervalo no firewall/NAT.
passive_port_min = 40000
passive_port_max = 40100

# Fila de conexoes pendentes no socket de controle.
backlog = 16
